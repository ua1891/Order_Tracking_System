{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">

    <!-- Decorative background elements -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-[-1]">
        <div class="absolute -top-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-brand-400/20 blur-3xl"></div>
        <div class="absolute top-[60%] -left-[10%] w-[30%] h-[30%] rounded-full bg-indigo-400/20 blur-3xl"></div>
    </div>

    <div class="w-full max-w-md">
        <div
            class="bg-white/70 backdrop-blur-xl shadow-2xl shadow-slate-200/50 rounded-3xl border border-white p-8 sm:p-10 relative overflow-hidden">

            <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-brand-400 to-indigo-500"></div>

            <div class="text-center mb-10">
                <div
                    class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-brand-50 to-indigo-50 text-brand-600 mb-6 shadow-inner border border-white">
                    <i class="ph-duotone ph-lock-key text-3xl"></i>
                </div>
                <h2 class="text-3xl font-display font-bold text-slate-800 tracking-tight">Admin Login</h2>
                <p class="text-slate-500 mt-2 font-medium">Please enter your credentials.</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
                <div class="space-y-1">
                    <label for="username" class="block text-sm font-semibold text-slate-700">Username</label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-brand-500 transition-colors">
                            <i class="ph ph-user text-lg"></i>
                        </div>
                        <input type="text" name="username" id="username" required
                            class="block w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all font-medium shadow-sm outline-none"
                            placeholder="admin">
                    </div>
                </div>

                <div class="space-y-1">
                    <label for="password" class="block text-sm font-semibold text-slate-700">Password</label>
                    <div class="relative group" x-data="{ show: false }">
                        <div
                            class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-brand-500 transition-colors">
                            <i class="ph ph-lock text-lg"></i>
                        </div>
                        <input :type="show ? 'text' : 'password'" name="password" id="password" required
                            class="block w-full pl-10 pr-12 py-3 bg-white border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all font-medium shadow-sm outline-none"
                            placeholder="••••••••">
                        <button type="button" @click="show = !show"
                            class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-400 hover:text-slate-600 transition-colors cursor-pointer">
                            <i class="ph" :class="show ? 'ph-eye-slash' : 'ph-eye'"></i>
                        </button>
                    </div>
                </div>

                <button type="submit"
                    class="w-full flex justify-center py-3.5 px-4 rounded-xl border border-transparent shadow-lg text-sm font-bold text-white bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 transition-all transform hover:-translate-y-0.5 mt-2">
                    Sign In to Dashboard <i class="ph-bold ph-arrow-right ml-2 text-lg"></i>
                </button>
            </form>

            <div class="mt-8 text-center text-xs text-slate-400 font-medium">
                PulseTrack &copy; {{ range(2023, 2026)|random }}
            </div>
        </div>
    </div>
</div>
{% endblock %}
